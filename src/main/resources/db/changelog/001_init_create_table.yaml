databaseChangeLog:
  # 1. Create independent master tables
  - changeSet:
      id: 001_init_create_permission_table
      author: choubvichet1001@gmail.com
      changes:
        - createTable:
            tableName: permission
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

  - changeSet:
      id: 002_init_create_role_table
      author: choubvichet1001@gmail.com
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

  - changeSet:
      id: 003_init_create_user_table
      author: choubvichet1001@gmail.com
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: user_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: account_non_expired
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: account_non_locked
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: credentials_non_expired
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  constraints:
                    nullable: false

  # 2. Create the Role-Permission relation
  - changeSet:
      id: 004_init_create_roles_permission_table
      author: choubvichet1001@gmail.com
      changes:
        - createTable:
            tableName: roles_permission
            columns:
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: permission_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: roles_permission
            columnNames: role_id, permission_id
            constraintName: pk_roles_permission
        - addForeignKeyConstraint:
            baseTableName: roles_permission
            baseColumnNames: role_id
            referencedTableName: roles
            referencedColumnNames: id
            constraintName: fk_roles_permission_role
        - addForeignKeyConstraint:
            baseTableName: roles_permission
            baseColumnNames: permission_id
            referencedTableName: permission
            referencedColumnNames: id
            constraintName: fk_roles_permission_permission

  # 3. Create the User-Role relation
  - changeSet:
      id: 005_init_create_user_roles_table
      author: choubvichet1001@gmail.com
      changes:
        - createTable:
            tableName: user_roles
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: user_roles
            columnNames: user_id, role_id
            constraintName: pk_user_roles
        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_roles_user
        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: role_id
            referencedTableName: roles
            referencedColumnNames: id
            constraintName: fk_user_roles_role

  # 4 create table category
  - changeSet:
      id: 006_init_create_category_table
      author: choubvichet1001@gmail.com
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: category_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATE
                  constraints:
                    nullable: false
  # 5 create table verificationCode
  - changeSet:
      id: create-verification-code
      author: choubvichet1001@gmail.com
      changes:
        - createTable:
            tableName: verification_code

            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: code
                  type: VARCHAR(6)
              - column:
                  name: expiration_time
                  type: TIMESTAMP
              - column:
                  name: verified
                  type: BOOLEAN

  # 6 create table brand
  - changeSet:
      id: create_brand_table
      author: choubvichet1001@gmail.com
      changes:
        - createTable:
            tableName: brand
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: brand_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: country
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: logo
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATE
                  constraints:
                    nullable: false

  # create watch table
  - changeSet:
      id: create_watch_table
      author: choubvichet1001@gmail.com
      changes:
        - createTable:
            tableName: watch
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: brand_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: model
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: movement
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: gender
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: water_resistance
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: case_material
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: strap_material
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: glass_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: warranty_month
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: watch
            baseColumnNames: brand_id
            referencedTableName: brand
            referencedColumnNames: id
            constraintName: fk_brand_id
        - addForeignKeyConstraint:
            baseTableName: watch
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_category_id

  # create watch image table
  - changeSet:
      id: create_watch_image2_table
      author: choubvichet1001@gmail.com
      changes:
        - createTable:
            tableName: watch_image
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: watch_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: image_url
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: is_primary
                  type: BOOLEAN
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: watch_image
            baseColumnNames: watch_id
            referencedTableName: watch
            referencedColumnNames: id
            constraintName: fk_watch_id

  # create inventory table
  - changeSet:
      id: create_inventory_table
      author: choubvichet1001@gmail.com
      changes:
        - createTable:
            tableName: inventory
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: watch_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: inventory
            baseColumnNames: watch_id
            referencedTableName: watch
            referencedColumnNames: id
            constraintName: fk_watch_id